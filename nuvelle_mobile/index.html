<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<title>Nuvelle — AI Shorts</title>
<meta name="theme-color" content="#0b0d16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nuvelle">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d16;--bg2:#10131f;--card:#151826;--line:#222840;--ink:#eef0f8;--dim:#9aa2c0;--faint:#6b7290;
  --p1:#b25cff;--p2:#ff5fbf;--grad:linear-gradient(92deg,#b25cff,#ff5fbf);
  --safeb:env(safe-area-inset-bottom,0px);--safet:env(safe-area-inset-top,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#05060b;color:var(--ink);font-family:'Space Grotesk',Inter,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
img{display:block}
a{color:inherit;text-decoration:none}
#app{max-width:480px;margin:0 auto;height:100dvh;background:var(--bg);position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 60px #000}

/* top bar */
.bar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;padding:calc(12px + var(--safet)) 16px 12px;background:linear-gradient(#0b0d16,#0b0d16ee 70%,transparent);backdrop-filter:blur(6px)}
.brand{display:flex;align-items:center;gap:9px}
.brand svg{flex:none;filter:drop-shadow(0 2px 8px #ff5fbf55)}
.brand b{font-weight:600;font-size:21px;color:#fff;font-family:'Space Grotesk'}
.bar .sp{flex:1}
.ibtn{font-size:13px;font-weight:600;padding:8px 13px;border-radius:30px;background:var(--grad);color:#fff;border:none;display:none}
.ibtn.show{display:inline-block}

/* scroll views */
.views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:96px;display:none}
.view.on{display:block}
.view::-webkit-scrollbar{display:none}

/* hero */
.hero{position:relative;margin:4px 0 8px;height:64vh;max-height:560px;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center 22%}
.hero .sh{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 3%,transparent 46%,transparent 70%,#0b0d1688)}
.hero .c{position:absolute;left:18px;right:18px;bottom:18px}
.hero .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:#a14bff44;border:1px solid #ffffff33;padding:5px 11px;border-radius:30px;margin-bottom:12px;backdrop-filter:blur(6px)}
.hero h1{font-size:34px;font-weight:700;line-height:1.05;letter-spacing:-.02em}
.hero p{color:#dcdfeb;font-size:13.5px;margin:9px 0 15px;line-height:1.5;max-height:60px;overflow:hidden}
.hero .row{display:flex;gap:10px}
.pbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--grad);color:#fff;font-weight:700;font-size:15px;padding:13px;border-radius:14px;border:none}
.sbtn{width:54px;display:flex;align-items:center;justify-content:center;background:#ffffff18;border:1px solid var(--line);border-radius:14px;font-size:20px;backdrop-filter:blur(8px)}

/* rows */
.sec{margin:18px 0 4px}
.sec .h{display:flex;align-items:center;justify-content:space-between;padding:0 16px 11px}
.sec .h h2{font-size:17px;font-weight:600}
.sec .h a{font-size:12.5px;color:var(--dim)}
.scroll{display:flex;gap:11px;overflow-x:auto;padding:0 16px 4px;scroll-snap-type:x mandatory}
.scroll::-webkit-scrollbar{display:none}
.tile{flex:none;width:128px;scroll-snap-align:start}
.tile .p{position:relative;border-radius:13px;overflow:hidden;aspect-ratio:2/3;border:1px solid var(--line);background:#11friendly;background:#111827}
.tile .p img{width:100%;height:100%;object-fit:cover}
.tile .p .ep{position:absolute;top:7px;right:7px;font-size:10px;font-weight:600;color:#fff;background:var(--grad);padding:2px 7px;border-radius:20px}
.tile .t{font-size:12.5px;font-weight:600;margin-top:8px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tile .g{font-size:11px;color:var(--faint);margin-top:2px}

/* ranked */
.rank{flex:none;display:flex;align-items:flex-end;scroll-snap-align:start}
.rank .n{font-weight:700;font-size:84px;line-height:.74;letter-spacing:-.05em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:2px #2a3050;margin-right:-4px}
.rank .p{position:relative;width:92px;aspect-ratio:2/3;border-radius:11px;overflow:hidden;border:1px solid var(--line)}
.rank .p img{width:100%;height:100%;object-fit:cover}

/* search */
.searchwrap{padding:8px 16px 4px}
.sbox{display:flex;align-items:center;gap:9px;background:#0c0f1a;border:1px solid var(--line);border-radius:13px;padding:12px 14px}
.sbox input{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font-family:inherit;font-size:15px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:13px 16px 4px}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;font-size:12.5px;color:var(--dim);border:1px solid var(--line);border-radius:30px;padding:7px 14px;background:#0c0f1a}
.chip.on{color:#fff;background:var(--grad);border-color:transparent}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;padding:14px 16px}
.empty{color:var(--dim);font-size:14px;padding:30px 18px;text-align:center}

/* generic title */
.vtitle{font-size:23px;font-weight:700;letter-spacing:-.02em;padding:10px 16px 2px}
.vsub{color:var(--dim);font-size:13.5px;padding:0 16px 8px}

/* profile */
.pcard{margin:14px 16px;border-radius:18px;border:1px solid var(--line);background:linear-gradient(150deg,#1a1030,#10131f);padding:22px;display:flex;align-items:center;gap:14px}
.pcard .av{width:56px;height:56px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:#fff}
.pcard .nm{font-size:18px;font-weight:600}
.pcard .ms{font-size:12.5px;color:var(--dim)}
.list{margin:6px 16px}
.li{display:flex;align-items:center;gap:13px;padding:15px 4px;border-bottom:1px solid var(--line);font-size:15px}
.li .ic{width:22px;text-align:center}
.li .ar{margin-left:auto;color:var(--faint)}
.installrow{margin:14px 16px;display:flex;gap:10px;align-items:center;background:#a14bff14;border:1px solid #a14bff33;border-radius:14px;padding:14px}
.installrow b{font-size:14px}.installrow p{font-size:12px;color:var(--dim);margin-top:2px}
.installrow button{margin-left:auto;background:var(--grad);color:#fff;border:none;font-weight:600;font-size:13px;padding:9px 14px;border-radius:30px;flex:none}

/* bottom tab bar */
.tabs{position:absolute;left:0;right:0;bottom:0;z-index:40;display:flex;background:rgba(12,14,22,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line);padding-bottom:var(--safeb)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 9px;color:var(--faint);font-size:10.5px;font-weight:500;background:none;border:none}
.tab svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9}
.tab.on{color:#fff}
.tab.on svg{stroke:var(--p2)}

/* detail sheet */
.sheet{position:absolute;inset:0;z-index:60;background:var(--bg);transform:translateY(100%);transition:transform .28s cubic-bezier(.3,.8,.3,1);overflow-y:auto;display:flex;flex-direction:column;padding-bottom:calc(20px + var(--safeb))}
.sheet.on{transform:translateY(0)}
.sheet .hd{position:relative;height:50vh;max-height:430px;overflow:hidden;flex:none}
.sheet .hd img{width:100%;height:100%;object-fit:cover;object-position:center 18%}
.sheet .hd .sh{position:absolute;inset:0;background:linear-gradient(to top,var(--bg),transparent 55%)}
.sheet .back{position:absolute;top:calc(12px + var(--safet));left:14px;width:38px;height:38px;border-radius:50%;background:#0009;backdrop-filter:blur(6px);border:1px solid var(--line);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
.sheet .body{padding:0 18px;margin-top:-50px;position:relative;z-index:2}
.sheet .gtag{display:inline-block;font-size:11px;color:#fff;background:var(--grad);padding:4px 11px;border-radius:20px;font-weight:600}
.sheet h2{font-size:27px;font-weight:700;letter-spacing:-.02em;margin:11px 0 0;line-height:1.1}
.sheet .meta{display:flex;gap:16px;color:var(--dim);font-size:13px;margin:11px 0}
.sheet .meta b{color:#fff}
.sheet .syn{color:var(--dim);font-size:14.5px;line-height:1.6;margin-bottom:18px}
.sheet .play{display:flex;align-items:center;justify-content:center;gap:9px;background:var(--grad);color:#fff;font-weight:700;font-size:16px;padding:15px;border-radius:14px;border:none;width:100%;margin-bottom:8px}
.sheet .save{display:flex;align-items:center;justify-content:center;gap:9px;background:#ffffff12;color:#fff;border:1px solid var(--line);font-weight:600;font-size:15px;padding:13px;border-radius:14px;width:100%;margin-bottom:20px}
.sheet h3{font-size:15px;font-weight:600;margin:6px 0 12px}
.epg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.epg .e{aspect-ratio:1;border-radius:11px;border:1px solid var(--line);background:#0c0f1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:15px;font-weight:600}
.epg .e small{font-size:9px;color:var(--p2);font-weight:600}
.epg .e.lock{color:var(--faint)}

/* toast */
.toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:#1c2030;border:1px solid var(--line);color:#fff;font-size:13px;padding:11px 18px;border-radius:30px;opacity:0;transition:.25s;z-index:70;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head>
<body><div id="app">

  <div class="bar">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 72 72">
        <defs>
          <linearGradient id="rg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#b25cff"/><stop offset="1" stop-color="#ff5fbf"/></linearGradient>
          <linearGradient id="rg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff5fbf"/><stop offset="1" stop-color="#ff96d0"/></linearGradient>
          <linearGradient id="rg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd0e8"/><stop offset="1" stop-color="#ff96d0"/></linearGradient>
        </defs>
        <polygon points="16,15 27,15 27,57 16,57" fill="url(#rg1)"/>
        <polygon points="16,15 27,15 56,57 45,57" fill="url(#rg2)"/>
        <polygon points="27,15 33,15 56,52 50,52" fill="url(#rg3)"/>
        <polygon points="45,15 56,15 56,57 45,57" fill="url(#rg1)"/>
      </svg>
      <b>Nuvelle</b>
    </div>
    <div class="sp"></div>
    <button class="ibtn" id="installBtn" onclick="doInstall()">⤓ Install</button>
  </div>

  <div class="views">
    <div class="view on" id="v-home"></div>
    <div class="view" id="v-search">
      <div class="searchwrap"><div class="sbox">🔍 <input id="q" placeholder="Search dramas, genres…" autocomplete="off"></div></div>
      <div class="chips" id="chips"></div>
      <div class="grid" id="sgrid"></div>
    </div>
    <div class="view" id="v-list">
      <div class="vtitle">My List</div>
      <div class="vsub">Dramas you saved to binge later.</div>
      <div class="grid" id="lgrid"></div>
    </div>
    <div class="view" id="v-profile"></div>
  </div>

  <div class="sheet" id="sheet"></div>

  <div class="tabs">
    <button class="tab on" data-v="home" onclick="go('home')"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg>Home</button>
    <button class="tab" data-v="search" onclick="go('search')"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Search</button>
    <button class="tab" data-v="list" onclick="go('list')"><svg viewBox="0 0 24 24"><path d="M6 4h12a1 1 0 011 1v15l-7-4-7 4V5a1 1 0 011-1z"/></svg>My List</button>
    <button class="tab" data-v="profile" onclick="go('profile')"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Me</button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const C = {
  ceo_secret_wife:{t:"The CEO's Secret Wife",g:"Hidden Identity",e:"EP 1-8",s:"She mops his lobby by day — and signs the deal that buys his empire by night."},
  rejected_alpha:{t:"Rejected by My Alpha",g:"Werewolf",e:"EP 1-12",s:"Cast out as the weakest omega, she awakens the moon's deadliest power."},
  returning_luna:{t:"Returning Luna's Revenge",g:"Werewolf",e:"EP 1-10",s:"The pack exiled their Luna. The moon sent her back for vengeance."},
  runaway_bride:{t:"The Billionaire's Runaway Bride",g:"Flash Marriage",e:"EP 1-9",s:"She fled the altar in the rain — into the arms of the man she was running from."},
  faked_death:{t:"My Husband Faked His Death",g:"Revenge",e:"EP 1-11",s:"He buried a lie. She came back to bury him."},
  maid_mansion:{t:"The Maid Who Owned the Mansion",g:"Rags to Riches",e:"EP 1-8",s:"They threw her out with nothing. She came back holding the deed."},
  ruthless_don:{t:"Pregnant by the Ruthless Don",g:"Forbidden",e:"EP 1-10",s:"One night with the city's most dangerous man left her a secret worth killing for."},
  reborn_obsession:{t:"Reborn as His Obsession",g:"Second Chance",e:"EP 1-12",s:"She died betrayed. She woke one day before it all — and this time, he's obsessed."},
  nanny_single_dad:{t:"The Nanny and the Single Dad",g:"Sweet Romance",e:"EP 1-9",s:"She came to mind his daughter. She stayed to mend his heart."},
  sister_stole_life:{t:"My Sister Stole My Life",g:"Family Drama",e:"EP 1-10",s:"Same face. Stolen name. One sister will burn it all down."},
  midnight_stranger:{t:"Kissed by a Stranger at Midnight",g:"Love at First Sight",e:"EP 1-8",s:"One kiss with a stranger — who turned out to own everything she feared."},
  heiress_disguise:{t:"The Heiress in Disguise",g:"Hidden Identity",e:"EP 1-9",s:"They mocked the poor new girl. They never knew she owned the building."},
  twin_swap:{t:"The Twin Who Took My Place",g:"Family Drama",e:"EP 1-10",s:"Same face, two lives — one sister was never supposed to come back."},
  fake_heiress:{t:"Pretending to Be His Heiress",g:"Hidden Identity",e:"EP 1-9",s:"Hired to fake a name. She never meant to fall for the heir."},
  alpha_bodyguard:{t:"My Billionaire Bodyguard",g:"Forbidden",e:"EP 1-11",s:"He was paid to guard her body. No one paid him to lose his heart."},
  divorce_queen:{t:"The Divorce That Made Me Rich",g:"Revenge",e:"EP 1-8",s:"He signed the papers smiling. She walked out and bought his company."},
  secret_prince:{t:"I Married a Secret Prince",g:"Fairytale",e:"EP 1-10",s:"A quiet stranger at the diner — and a crown she never saw coming."},
  amnesia_love:{t:"He Forgot He Loved Me",g:"Tear-jerkers",e:"EP 1-9",s:"He lost every memory but one feeling he couldn't name — her."},
  mafia_wife:{t:"Wife of the Mafia King",g:"Forbidden",e:"EP 1-12",s:"She married a monster to save her family. He'd burn the world to keep her."},
  cinderella_ceo:{t:"From Maid to His Cinderella",g:"Rags to Riches",e:"EP 1-9",s:"One night in a borrowed gown, and the billionaire couldn't look away."},
};
const AFF = {}; // real 分销 deep-links go here per slug; empty -> app/coming-soon
const ROWS = {
  "New Releases":["ceo_secret_wife","reborn_obsession","midnight_stranger","divorce_queen","mafia_wife","secret_prince","cinderella_ceo"],
  "Hidden Identity":["ceo_secret_wife","heiress_disguise","fake_heiress","runaway_bride","maid_mansion","twin_swap"],
  "Magic & Mates":["rejected_alpha","returning_luna","alpha_bodyguard","mafia_wife"],
  "Love at First Sight":["midnight_stranger","runaway_bride","nanny_single_dad","secret_prince","amnesia_love","cinderella_ceo"],
  "Revenge & Reversal":["faked_death","sister_stole_life","divorce_queen","returning_luna","twin_swap","maid_mansion"],
};
const TOP10 = ["ceo_secret_wife","mafia_wife","reborn_obsession","divorce_queen","rejected_alpha","midnight_stranger","faked_death","secret_prince","heiress_disguise","cinderella_ceo"];
const ALL = Object.keys(C);
const HERO = "ceo_secret_wife";

function hash(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function stat(s){const h=hash(s);return{views:(0.4+(h%900)/100).toFixed(1)+"M",rate:(4.5+(h%5)/10).toFixed(1)};}
function poster(s){return "posters/"+s+".png";}
const LS="nuvelle_list";
function getList(){try{return JSON.parse(localStorage.getItem(LS))||[]}catch(e){return[]}}
function inList(s){return getList().includes(s);}
function toggleList(s){let l=getList();if(l.includes(s)){l=l.filter(x=>x!==s);toast("Removed from My List")}else{l.push(s);toast("Added to My List ❤")}localStorage.setItem(LS,JSON.stringify(l));renderList();if(curSlug===s)renderSheet(s);}

function tile(s){const d=C[s];return `<div class="tile" onclick="openSheet('${s}')"><div class="p"><img loading="lazy" src="${poster(s)}" alt="${d.t}"><span class="ep">${d.e}</span></div><div class="t">${d.t}</div><div class="g">${d.g}</div></div>`;}
function rankTile(s,i){const d=C[s];return `<div class="rank" onclick="openSheet('${s}')"><div class="n">${i+1}</div><div class="p"><img loading="lazy" src="${poster(s)}" alt="${d.t}"></div></div>`;}

function renderHome(){
  const d=C[HERO];
  let h=`<div class="hero"><img src="${poster(HERO)}" alt="${d.t}"><div class="sh"></div>
    <div class="c"><span class="badge">● Now Trending</span><h1>${d.t}</h1><p>${d.s}</p>
    <div class="row"><button class="pbtn" onclick="openSheet('${HERO}')">▶ Play Episode 1</button>
    <button class="sbtn" onclick="toggleList('${HERO}')">＋</button></div></div></div>`;
  h+=`<div class="sec"><div class="h"><h2>🏆 Top 10 This Week</h2></div><div class="scroll">${TOP10.map(rankTile).join("")}</div></div>`;
  for(const [name,slugs] of Object.entries(ROWS))
    h+=`<div class="sec"><div class="h"><h2>${name}</h2><a>See all</a></div><div class="scroll">${slugs.map(tile).join("")}</div></div>`;
  document.getElementById("v-home").innerHTML=h;
}
function renderSearch(t){
  const grid=document.getElementById("sgrid");
  const q=(t||"").trim().toLowerCase();
  let hits=ALL;
  if(activeChip&&activeChip!=="All")hits=hits.filter(s=>C[s].g===activeChip);
  if(q)hits=hits.filter(s=>(C[s].t+" "+C[s].g+" "+C[s].s).toLowerCase().includes(q));
  grid.innerHTML=hits.length?hits.map(tile).join(""):'<div class="empty">No dramas match. Try “revenge”, “werewolf”, “billionaire”…</div>';
}
let activeChip="All";
function renderChips(){
  const gs=["All",...Array.from(new Set(ALL.map(s=>C[s].g)))];
  document.getElementById("chips").innerHTML=gs.map(g=>`<div class="chip ${g===activeChip?'on':''}" onclick="setChip('${g.replace(/'/g,"\\'")}')">${g}</div>`).join("");
}
function setChip(g){activeChip=g;renderChips();renderSearch(document.getElementById("q").value);}
function renderList(){
  const l=getList();
  document.getElementById("lgrid").innerHTML=l.length?l.map(tile).join(""):'<div class="empty">Nothing saved yet.<br>Tap ＋ on any drama to add it here.</div>';
}
function renderProfile(){
  document.getElementById("v-profile").innerHTML=`
    <div class="vtitle">Profile</div>
    <div class="pcard"><div class="av">N</div><div><div class="nm">Nuvelle Guest</div><div class="ms">Free member · Sign in to sync</div></div></div>
    <div class="installrow"><div><b>Install Nuvelle</b><p>Add to your home screen — full-screen, offline-ready.</p></div><button onclick="doInstall()">Install</button></div>
    <div class="list">
      <div class="li"><span class="ic">🔔</span> Notifications <span class="ar">›</span></div>
      <div class="li"><span class="ic">🌙</span> Always dark <span class="ar">On</span></div>
      <div class="li"><span class="ic">💳</span> Coins & unlocks <span class="ar">›</span></div>
      <div class="li"><span class="ic">🌐</span> Visit nuvelle.ai <span class="ar">›</span></div>
      <div class="li"><span class="ic">ℹ️</span> About Nuvelle <span class="ar">›</span></div>
    </div>
    <div class="vsub" style="text-align:center;margin-top:14px">Nuvelle — the home of AI shorts · v1.0</div>`;
  document.querySelector('#v-profile .li:nth-child(7)')?.addEventListener('click',()=>location.href='https://nuvelle.ai');
}

/* detail sheet */
let curSlug=null;
function renderSheet(s){
  const d=C[s],st=stat(s),saved=inList(s);
  const n=parseInt((d.e.match(/\d+$/)||[8])[0])||8;
  let eps="";for(let i=1;i<=n;i++)eps+=`<div class="e ${i>2?'lock':''}">${i>2?'🔒':''}${i}<small>${i<=2?'FREE':''}</small></div>`;
  const real=AFF[s];
  document.getElementById("sheet").innerHTML=`
    <div class="hd"><img src="${poster(s)}" alt="${d.t}"><div class="sh"></div>
      <button class="back" onclick="closeSheet()">‹</button></div>
    <div class="body">
      <span class="gtag">${d.g}</span>
      <h2>${d.t}</h2>
      <div class="meta"><span>⭐ <b>${st.rate}</b></span><span><b>${d.e}</b></span><span>🔥 <b>${st.views}</b></span></div>
      <p class="syn">${d.s}</p>
      <button class="play" onclick="watch('${s}')">▶ Watch Episode 1</button>
      <button class="save" onclick="toggleList('${s}')">${saved?'✓ In My List':'＋ Add to My List'}</button>
      <h3>Episodes</h3>
      <div class="epg">${eps}</div>
    </div>`;
}
function openSheet(s){curSlug=s;renderSheet(s);document.getElementById("sheet").classList.add("on");}
function closeSheet(){document.getElementById("sheet").classList.remove("on");curSlug=null;}
function watch(s){const real=AFF[s];if(real){window.open(real,"_blank")}else{toast("Streaming soon — saved to My List");if(!inList(s))toggleList(s);}}

/* tabs */
function go(v){
  document.querySelectorAll(".view").forEach(e=>e.classList.remove("on"));
  document.getElementById("v-"+v).classList.add("on");
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.v===v));
  document.querySelector("#v-"+v).scrollTop=0;
}

/* toast */
let tT;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("on");clearTimeout(tT);tT=setTimeout(()=>t.classList.remove("on"),1800);}

/* install (PWA) */
let deferred=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferred=e;document.getElementById("installBtn").classList.add("show");});
function doInstall(){
  if(deferred){deferred.prompt();deferred.userChoice.then(()=>{deferred=null;document.getElementById("installBtn").classList.remove("show");});}
  else if(/iphone|ipad|ipod/i.test(navigator.userAgent)){toast("Tap ⎙ Share → ‘Add to Home Screen’");}
  else{toast("Open browser menu → ‘Install app’");}
}
window.addEventListener("appinstalled",()=>{document.getElementById("installBtn").classList.remove("show");toast("Installed ✓");});

/* init */
renderHome();renderChips();renderSearch("");renderList();renderProfile();
document.getElementById("q").addEventListener("input",function(){renderSearch(this.value);});
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
</body></html>
