services:
  api:
    build:
      context: .
      dockerfile: nuvelle_api/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nuvelle}:${POSTGRES_PASSWORD:-nuvelle_dev_password}@postgres:5432/${POSTGRES_DB:-nuvelle}
      PROMO_STORAGE_DIR: /workspace/nuvelle_kit/out
      PROMO_UPLOAD_DIR: /workspace/nuvelle_kit/_uploads
      PROMO_CACHE_DIR: /workspace/nuvelle_kit/_vidcache
      FLATKEY_API_KEY: ${FLATKEY_API_KEY:-}
      FLATKEY_BASE: ${FLATKEY_BASE:-https://router.flatkey.ai}
      PYTHONPATH: /app:/workspace
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./nuvelle_api:/app
      - ./nuvelle_kit:/workspace/nuvelle_kit
    depends_on:
      postgres:
        condition: service_healthy

  crawler:
    build:
      context: .
      dockerfile: nuvelle_crawler/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    command: uvicorn nuvelle_crawler.main:app --host 0.0.0.0 --port 8080 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nuvelle}:${POSTGRES_PASSWORD:-nuvelle_dev_password}@postgres:5432/${POSTGRES_DB:-nuvelle}
      CRAWLER_BASE_URL: ${CRAWLER_BASE_URL:-http://crawler:8080}
      GCP_PROJECT: ${GCP_PROJECT:-}
      GCP_LOCATION: ${GCP_LOCATION:-us-west1}
      CLOUD_TASKS_SERVICE_ACCOUNT: ${CLOUD_TASKS_SERVICE_ACCOUNT:-}
      REELSHORT_CPS_TOKEN: ${REELSHORT_CPS_TOKEN:-}
      PYTHONPATH: /app
    ports:
      - "${CRAWLER_PORT:-8080}:8080"
    volumes:
      - ./nuvelle_crawler/nuvelle_crawler:/app/nuvelle_crawler
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nuvelle}
      POSTGRES_USER: ${POSTGRES_USER:-nuvelle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nuvelle_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nuvelle} -d ${POSTGRES_DB:-nuvelle}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
