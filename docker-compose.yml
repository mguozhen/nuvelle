services:
  api:
    build:
      context: .
      dockerfile: nuvelle_api/Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nuvelle}:${POSTGRES_PASSWORD:-nuvelle_dev_password}@postgres:5432/${POSTGRES_DB:-nuvelle}
      PROMO_STORAGE_DIR: /workspace/nuvelle_kit/out
      PROMO_UPLOAD_DIR: /workspace/nuvelle_kit/_uploads
      PROMO_CACHE_DIR: /workspace/nuvelle_kit/_vidcache
      PYTHONPATH: /app:/workspace
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./nuvelle_api:/app
      - ./nuvelle_kit:/workspace/nuvelle_kit
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nuvelle}
      POSTGRES_USER: ${POSTGRES_USER:-nuvelle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nuvelle_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nuvelle} -d ${POSTGRES_DB:-nuvelle}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
