server {
    # Cloud Run 容器默认通过 8080 对外提供 HTTP 服务。
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # 单页应用刷新子路由时回退到 index.html。
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|json|webmanifest|png|jpg|jpeg|gif|webp|ico|svg|mp4|mp3|woff|woff2|ttf)$ {
        # 静态资源不存在就返回 404，存在则给浏览器短期缓存。
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }
}
